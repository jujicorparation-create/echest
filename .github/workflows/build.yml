name: Build EChest Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v4.9.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup dependencies via Maven
        run: |
          mkdir -p libs
          mvn dependency:get -Dartifact=net.minecraftforge:forge:1.12.2-14.23.5.2860:jar:universal -Ddest=libs/forge.jar -Dmaven.repo.remote=https://maven.minecraftforge.net || true
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.12.2-14.23.5.2860/forge-1.12.2-14.23.5.2860-universal.jar" -o libs/forge.jar
          curl -L "https://piston-data.mojang.com/v1/objects/0f275bc1547d01fa5f56ba34bdc87d981ee12daf/client.jar" -o libs/minecraft.jar
          curl -L "https://files.minecraftforge.net/maven/de/oceanlabs/mcp/mcp_stable/39-1.12/mcp_stable-39-1.12-srg.zip" -o mcp_srg.zip || true
          ls -la libs/

      - name: Deobfuscate Minecraft JAR
        run: |
          pip install requests 2>/dev/null || true
          cat > deobf.py << 'PYEOF'
          import zipfile, os, shutil

          # Check jar contents
          with zipfile.ZipFile('libs/minecraft.jar', 'r') as z:
              names = z.namelist()
              mc_classes = [n for n in names if n.endswith('.class') and 'net/minecraft' in n]
              print(f"Minecraft classes found: {len(mc_classes)}")
              if mc_classes:
                  print("Sample:", mc_classes[:3])
          PYEOF
          python3 deobf.py

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: echestmod-1.0.0
          path: build/libs/echestmod-*.jar
          if-no-files-found: error
