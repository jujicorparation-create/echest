name: Build EChest Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v4.9.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Get deobfuscated Forge dev jar
        run: |
          mkdir -p libs
          # Forge 1.12.2 dev jar contains deobfuscated classes
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.12.2-14.23.5.2860/forge-1.12.2-14.23.5.2860-universal.jar" -o libs/forge.jar
          # Use fernflower/SpecialSource approach - get MCP bot jar which has deobf classes
          curl -L "https://github.com/MinecraftForge/ForgeGradle/releases/download/FG_2.3/ForgeGradle-2.3.jar" -o libs/forgegradletools.jar 2>/dev/null || true
          # Download already-deobfuscated jar from alternative source
          curl -L "https://repo1.maven.org/maven2/net/minecraftforge/forge/1.12.2-14.23.5.2860/forge-1.12.2-14.23.5.2860.jar" -o libs/forge-dev.jar 2>/dev/null || true
          ls -la libs/
          # Check what's in forge.jar
          jar tf libs/forge.jar | grep "net/minecraft/client/Minecraft" | head -5 || echo "Not found in forge.jar"
          jar tf libs/forge.jar | grep "cpw\|net/minecraftforge" | head -5

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: echestmod-1.0.0
          path: build/libs/echestmod-*.jar
          if-no-files-found: error
